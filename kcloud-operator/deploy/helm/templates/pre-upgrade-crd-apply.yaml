{{/*
pre-upgrade-crd-apply.yaml: helm upgrade 시 operator 바이너리의 apply-crds 서브명령으로 CRD를 자동 적용하는 pre-upgrade Job.
상세: Helm은 설계상 crds/ 디렉토리를 install 시에만 처리하고 upgrade에서는 건드리지 않음.
      이 Job이 operator 이미지(apply-crds 서브명령 내장)를 재사용하여 CRD를 server-side apply로 반영함.
      post-install hook(DIP/NCP) 이전에 실행되도록 weight=-10 지정.
생성일: 2026-04-17 | 수정일: 2026-04-17
*/}}
{{- if .Values.crdUpgrade.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-crd-upgrade
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-crd-upgrade
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-crd-upgrade
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-crd-upgrade
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-crd-upgrade
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-crd-upgrade
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-crd-upgrade
      restartPolicy: OnFailure
      containers:
        - name: apply-crds
          image: "{{ include "kcloud-operator.image" (dict "registry" .Values.global.registry "repo" .Values.image.repository "tag" .Values.image.tag) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["apply-crds"]
{{- end }}
