{{/*
pre-upgrade-cleanup-old-ds.yaml: helm upgrade 시 구 이름 DaemonSet 전체를 사전 삭제하는 pre-upgrade Job.
상세: DS selector 가 immutable 이므로 이름 변경 시 구 DS 를 삭제 후 신 DS 를 재생성해야 함.
      삭제 목록에는 v0.5.23 이전의 모든 구 이름이 포함되어 있어 복수 세대 업그레이드도 안전.
        - (pre-v0.5.7) npu-op-<vendor>-device-plugin  → 5종
        - (v0.5.7~v0.5.22) npu-op-detector, npu-op-device-plugin-<vendor> → 6종,
                            npu-op-driver-<vendor>-<model> → 4종
      --ignore-not-found 로 이미 없는 경우도 안전하게 처리.
      kubectl 이미지는 .Values.crdUpgrade.kubectlImage (기본 public "bitnami/kubectl:1.28").
      airgap 환경은 해당 값을 사설 미러 경로로 override.
생성일: 2026-04-22 | 수정일: 2026-06-02
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: npu-op-cleanup-old-ds
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: npu-op-cleanup-old-ds
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: npu-op-cleanup-old-ds
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: npu-op-cleanup-old-ds
subjects:
  - kind: ServiceAccount
    name: npu-op-cleanup-old-ds
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: npu-op-cleanup-old-ds
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: npu-op-cleanup-old-ds
      restartPolicy: OnFailure
      containers:
        - name: cleanup-old-ds
          image: "{{ .Values.crdUpgrade.kubectlImage | default (include "kcloud-operator.image" (dict "registry" .Values.global.registry "repo" .Values.crdUpgrade.kubectlRepository "tag" .Values.crdUpgrade.kubectlTag)) }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # (1) pre-v0.5.7 구 이름: npu-op-<vendor>-device-plugin
              kubectl -n kube-system delete ds --ignore-not-found \
                npu-op-nvidia-device-plugin \
                npu-op-furiosa-device-plugin \
                npu-op-furiosa-rngd-device-plugin \
                npu-op-rbln-device-plugin
              # (2) v0.5.7~v0.5.22 구 이름: detector / npu-op-device-plugin-<vendor>
              kubectl -n kube-system delete ds --ignore-not-found \
                npu-op-detector \
                npu-op-device-plugin-nvidia \
                npu-op-device-plugin-furiosa \
                npu-op-device-plugin-furiosa-rngd \
                npu-op-device-plugin-rbln
              # (3) v0.5.7~v0.5.22 구 이름: npu-op-driver-<vendor>-<model>
              kubectl -n kube-system delete ds --ignore-not-found \
                npu-op-driver-nvidia-generic \
                npu-op-driver-furiosa-warboy \
                npu-op-driver-furiosa-rngd
              echo "pre-upgrade cleanup done"
