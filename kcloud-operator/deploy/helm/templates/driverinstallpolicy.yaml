# ============================================================
# driverinstallpolicy.yaml: DriverInstallPolicy CR 자동 생성
# 상세: driverInstallPolicies.<vendor>.enabled=true 인 각 벤더에 대해 DIP CR 생성.
#       Furiosa (warboy) / NVIDIA (generic) 두 벤더 모두 mode=daemonset 기본.
# 생성일: 2026-04-10 | 수정일: 2026-04-21
# ============================================================
{{- if .Values.driverInstallPolicies.furiosa.enabled }}
apiVersion: npu.ai/v1alpha1
kind: DriverInstallPolicy
metadata:
  name: {{ .Values.driverInstallPolicies.furiosa.name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  vendor: {{ .Values.driverInstallPolicies.furiosa.vendor }}
  model: {{ .Values.driverInstallPolicies.furiosa.model }}
  rebootStrategy: {{ .Values.driverInstallPolicies.furiosa.rebootStrategy }}
  kernelAllowlist:
    {{- toYaml .Values.driverInstallPolicies.furiosa.kernelAllowlist | nindent 4 }}
  containerdMinVersion: "{{ .Values.driverInstallPolicies.furiosa.containerdMinVersion }}"
  driver:
    {{- with .Values.driverInstallPolicies.furiosa.driver.mode }}
    mode: {{ . }}
    {{- end }}
    version: "{{ .Values.driverInstallPolicies.furiosa.driver.version }}"
    image: "{{ include "kcloud-operator.image" (dict "registry" .Values.global.registry "repo" .Values.driverInstallPolicies.furiosa.driver.repository "tag" .Values.driverInstallPolicies.furiosa.driver.tag) }}"
    {{- with .Values.driverInstallPolicies.furiosa.driver.installer }}
    installer: {{ . }}
    {{- end }}
    {{- with .Values.driverInstallPolicies.furiosa.driver.env }}
    env:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- with .Values.driverInstallPolicies.furiosa.verifiedVersions }}
  verifiedVersions:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.driverInstallPolicies.furiosa.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.driverInstallPolicies.furiosa.upgradePolicy }}
  upgradePolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
