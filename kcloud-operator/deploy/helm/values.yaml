# values.yaml: NPU Operator 기본 설정값
# 생성일: 2026-03-25 | 수정일: 2026-06-02

# ─────────────────────────────────────────────────────────────────────────────
# global.registry: 사설 이미지(operator/detector/device-plugin/driver)의 레지스트리.
#   기본값은 placeholder("<your-registry>") 이므로 그대로 두면 사설 IP 가 노출되지 않음.
#   설치 시 한 줄로 주입:  --set global.registry=<host:port>  또는  -f values-airgap.example.yaml
#   비어있으면("") 사설 이미지는 registry-relative(repo:tag, Docker Hub 기본)로 렌더됨.
#   public device-plugin 이미지(nvcr.io / ghcr.io)는 이 prefix 가 적용되지 않음.
#   (bitnami/kubectl 은 crdUpgrade 블록에서 global.registry 로 미러 조립됨 — airgap 대응)
# ─────────────────────────────────────────────────────────────────────────────
global:
  registry: "<your-registry>"

# operator 이미지: registry 는 global.registry 로 조립됨 (repository 는 registry-relative path).
image:
  repository: npu-operator
  tag: v0.5.24
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

metricsService:
  enabled: false
  port: 8443

deployClusterPolicy: true

clusterPolicy:
  name: npuclusterpolicy-sample
  namespace: ""

detector:
  # registry 는 global.registry 로 조립됨 (repository 는 registry-relative path).
  repository: "npu-detector"
  tag: "0.4.3"
  namespace: "kube-system"

# ─────────────────────────────────────────────────────────────────────────────
# NOTE: 아래 nvidia/furiosa 블록은 NPUClusterPolicy CR의 devicePlugin 설정입니다.
#       드라이버 설치 정책(DriverInstallPolicy CR)은 하단 driverInstallPolicies 블록을
#       사용하세요. 두 블록은 별개의 CRD를 대상으로 합니다.
# ─────────────────────────────────────────────────────────────────────────────
nvidia:
  enabled: true
  devicePluginImage: "nvcr.io/nvidia/k8s-device-plugin:v0.17.1"
  nodeSelector:
    nvidia.com/gpu.present: "true"

furiosa:
  enabled: true
  devicePluginImage: "ghcr.io/furiosa-ai/k8s-device-plugin:0.10.1"
  configMapName: "npu-device-plugin"
  nodeSelector:
    furiosa: "true"
  # ─────────────────────────────────────────────────────────────────────
  # Furiosa RNGD device plugin (Phase 1, 2026-04-21)
  # spec.furiosa.rngd 필드 — omitempty 이므로 enabled=false 시 CR에서 생략됨.
  # ─────────────────────────────────────────────────────────────────────
  rngd:
    enabled: true
    # ⚠️ partitionPolicy != "none" 은 operator 가 device-plugin 에 `--policy <값>` 을
    #    전달하므로, 그 flag 를 지원하는 파티션 가능 이미지(`furiosa-device-plugin-mi`)가
    #    반드시 필요하다. 일반 `furiosaai/furiosa-device-plugin` 이미지는 `--policy` 미지원
    #    → CrashLoopBackOff(unknown flag). 아래 기본값은 production(4 instance/card) 재현용.
    # registry 는 global.registry 로 조립됨 (repository 는 registry-relative path).
    devicePluginRepository: "kcloud/furiosa-device-plugin-mi"
    devicePluginTag: "v0.1.0"
    resourceName: "furiosa.ai/rngd"
    # 파티션 정책: "none"(1) / "quad-core"(2) / "dual-core"(4) / "single-core"(8) instance/card.
    # "none" 으로 바꾸면 위 -mi 이미지든 일반 이미지든 동작(--policy 미전달).
    partitionPolicy: "dual-core"
    # 직접 라벨링 방식 (Warboy/NVIDIA 와 일관). NFD 의존 제거.
    # rngd-1 노드에 수동/Operator 로 `furiosa-rngd=true` 부여 필요.
    nodeSelector:
      furiosa-rngd: "true"

rebellions:
  enabled: true
  # 사설 이미지: registry 는 global.registry 로 조립됨 (repository 는 registry-relative path).
  devicePluginRepository: "rebellions/k8s-device-plugin"
  devicePluginTag: "v0.3.6"
  resourceName: "ATOM"
  resourcePrefix: "rebellions.ai"
  # 2026-04-22: Warboy/RNGD/NVIDIA 와 동일하게 kube-system 으로 통일.
  # 2026-06-02: DS/SA/ConfigMap 이름 prefix 를 `rbln-device-plugin` 으로 변경 (§1 리네임).
  namespace: "kube-system"
  configMapName: "rbln-device-plugin-config"
  nodeSelector:
    rebellions-atom: "true"
    kubernetes.io/arch: "amd64"

runtimeClass:
  nvidia:
    enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# DriverInstallPolicy CR 자동 생성 설정 (driverInstallPolicies와 nvidia/furiosa 구분)
# ─────────────────────────────────────────────────────────────────────────────
driverInstallPolicies:
  # ─────────────────────────────────────────────────────────────────────
  # Furiosa Warboy (mode=daemonset)
  # 기존 mode=job (`furiosa-warboy`) + tester mode=daemonset (`furiosa-warboy-ds`)
  # 중복을 2026-04-21 에 mode=daemonset 단일 정책으로 통합 (P0-3).
  # 이전 배포와의 충돌 방지를 위해 이름도 `furiosa-warboy-ds` 로 고정.
  # mode=job 으로 회귀가 필요하면 values override 로 enabled=false 후 수동 CR 생성.
  # ─────────────────────────────────────────────────────────────────────
  furiosa:
    enabled: true
    name: furiosa-warboy-ds
    vendor: furiosa
    model: warboy
    rebootStrategy: IfNeeded
    kernelAllowlist: ["5.15.*", "6.8.*"]
    containerdMinVersion: "1.7.0"
    # verifiedVersions: 검증된 driver version 화이트리스트.
    # 비어있으면 버전 검증 skip (backward compat). 추가 시 외 버전은 UnverifiedVersion 상태로 거부.
    verifiedVersions:
      - "1.7.8"
      - "1.9.8-3"
      - "1.9.9-3"
    # Furiosa installer DaemonSet 은 furiosa=true 라벨이 붙은 노드에만 스케줄된다.
    # detector 오탐으로 NVIDIA-only 노드에서 Furiosa 가 보고되더라도 nodeSelector 로 2차 차단.
    nodeSelector:
      furiosa: "true"
    driver:
      # mode=daemonset 은 /usr/local/bin/entrypoint.sh 가 포함된 containerized driver 이미지 필요.
      # plain 태그 (e.g. 1.9.8-3) 는 entrypoint 누락된 broken image — 반드시 -v2 접미사 사용.
      # 상세: docs/05 §4.2.7 알려진 이슈
      mode: daemonset
      version: "1.9.8-3"
      # registry 는 global.registry 로 조립됨 (repository 는 registry-relative path).
      repository: "furiosa-driver-ds"
      tag: "1.9.8-3-v2"
      installer: apt
    upgradePolicy:
      autoUpgrade: true
      drainEnabled: true
      forceUpgrade: false
      maxUnavailable: 1
      maxParallelUpgrades: 1
      drainTimeout: "5m"
      validationTimeout: "10m"
      rollbackOnFailure: true
  # ─────────────────────────────────────────────────────────────────────
  # NVIDIA generic (mode=daemonset)
  # 2026-04-21 에 기본값을 enabled=true 로 전환 (P0-1). image 는 -v16 접미사 필수.
  # ─────────────────────────────────────────────────────────────────────
  nvidia:
    enabled: true
    name: nvidia-gpu-ds
    vendor: nvidia
    model: generic
    rebootStrategy: IfNeeded
    kernelAllowlist: ["5.15.*", "6.8.*"]
    containerdMinVersion: "1.7.0"
    # verifiedVersions: 검증된 driver version 화이트리스트.
    verifiedVersions:
      - "535.288.01"
      - "580.126.09"
      - "580.142"
      - "580.159.03"
      - "595.58.03"
    nodeSelector:
      nvidia.com/gpu.present: "true"
    driver:
      mode: daemonset
      # plain 태그 (e.g. 580.126.09) 는 entrypoint 누락된 broken image —
      # idempotent skip + race-safe host module pool 재검사 + 강화된 NVRM regex
      # 가 적용된 -v173 (v17.3) 사용 권장. -v16 (legacy host install) 는 deprecated.
      # default 는 worker1 host 가 보유한 580.159.03 + -v173 (first-try Idle 도달).
      # 2026-06-01: worker1 실설치=580.159.03 고정. 580.142-v173 → 580.159.03-v173 교정
      #             (라이브 무중단 복구, idempotent skip 경로). 상세: docs/05 §4.2.7 알려진 이슈
      version: "580.159.03"
      # registry 는 global.registry 로 조립됨 (repository 는 registry-relative path).
      repository: "nvidia-driver-ds"
      tag: "580.159.03-v173"
      installer: apt
      env:
        - name: NVIDIA_DRIVER_CHOICE
          value: "recommended"
    toolkit:
      enabled: true
      method: apt
    upgradePolicy:
      autoUpgrade: true
      drainEnabled: true
      forceUpgrade: false
      maxUnavailable: 1
      maxParallelUpgrades: 1
      drainTimeout: "5m"
      validationTimeout: "10m"
      rollbackOnFailure: true

  # ─────────────────────────────────────────────────────────────────────
  # Furiosa RNGD (mode=daemonset)
  # 2026-04-21 Phase 1 신규 추가. rngd-1 노드 준비 완료이므로 default enabled=true.
  # ─────────────────────────────────────────────────────────────────────
  rngd:
    enabled: true
    name: furiosa-rngd-ds
    vendor: furiosa
    model: rngd
    rebootStrategy: IfNeeded
    kernelAllowlist: ["6.3.*", "6.5.*", "6.8.*"]
    containerdMinVersion: "1.7.0"
    # verifiedVersions: 검증된 driver version 화이트리스트.
    verifiedVersions:
      - "2026.1.0"
    nodeSelector:
      furiosa-rngd: "true"
    driver:
      mode: daemonset
      version: "2026.1.0"
      # registry 는 global.registry 로 조립됨 (repository 는 registry-relative path).
      repository: "furiosa-rngd-driver-installer"
      tag: "2026.1.0"
      installer: apt
    upgradePolicy:
      autoUpgrade: true
      drainEnabled: true
      rollbackOnFailure: true
      maxUnavailable: 1
      validationTimeout: "10m"

rollingUpdate:
  maxUnavailable: 1

# ─────────────────────────────────────────────────────────────────────────────
# crdUpgrade: helm upgrade 시 operator 바이너리의 apply-crds 서브명령으로 CRD를 자동 적용.
# Helm은 설계상 crds/를 install 전용으로 다루므로 upgrade 시 수동 `kubectl apply -f crds/`
# 가 필요한데, 이 옵션으로 Job이 대신 수행하여 절차를 단순화함.
# pre-upgrade Job은 operator 이미지(image.repository:image.tag)를 재사용하므로
# 별도 이미지 미러링이 불필요함.
# 운영 정책상 수동 적용을 선호하거나 Job이 사용할 권한을 부여할 수 없는 환경에서는
# `enabled: false`로 비활성화하고 기존 절차(docs/operator_v1.3.md §3.4) 사용.
# ─────────────────────────────────────────────────────────────────────────────
crdUpgrade:
  enabled: true
  # pre-upgrade cleanup Job(구 이름 DaemonSet 삭제)이 사용하는 kubectl 이미지.
  # 기본 동작: 다른 사설 이미지와 동일하게 global.registry 로 조립됨
  #   - global.registry 설정 시 → <registry>/bitnami/kubectl:1.28 (사설 미러, airgap 정상)
  #   - global.registry 가 비어("") 있으면 → bitnami/kubectl:1.28 (public Docker Hub)
  # kubectlImage 를 명시하면 global.registry 를 무시하고 그 값을 그대로 사용(full override).
  kubectlRepository: bitnami/kubectl
  kubectlTag: "1.28"
  kubectlImage: ""

# Leader election (controller-runtime Lease-based)
leaderElection:
  enabled: true

# Pod placement & runtime tuning
imagePullSecrets: []
nodeSelector: {}
tolerations: []
affinity: {}

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
