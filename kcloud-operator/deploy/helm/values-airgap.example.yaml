# values-airgap.example.yaml: airgap/사설 미러 배포 예시 오버라이드
# 상세: 모든 이미지(사설 + public device-plugin + bitnami/kubectl)를 단일 사설 미러로 지정하는 방법.
#       사용:  helm install/upgrade <release> kcloud-operator/deploy/helm -f values-airgap.example.yaml
#       <your-registry> 부분을 실제 미러 host:port (예: registry.internal:5000) 로 교체하세요.
# 생성일: 2026-06-02

# ─────────────────────────────────────────────────────────────────────────────
# (1) 사설 이미지: operator/detector/device-plugin/driver 는 global.registry 한 줄로 일괄 prefix.
#     아래 한 값만 바꾸면 image.repository / detector.repository / *.devicePluginRepository /
#     driverInstallPolicies.*.driver.repository 가 모두 <your-registry>/<repo>:<tag> 로 조립됨.
# ─────────────────────────────────────────────────────────────────────────────
global:
  registry: "<your-registry>"   # 예: registry.internal:5000

# ─────────────────────────────────────────────────────────────────────────────
# (2) public device-plugin 이미지: global.registry prefix 가 적용되지 않으므로
#     airgap 에서는 full 경로를 사설 미러로 명시 override.
# ─────────────────────────────────────────────────────────────────────────────
nvidia:
  devicePluginImage: "<your-registry>/nvidia/k8s-device-plugin:v0.17.1"

furiosa:
  devicePluginImage: "<your-registry>/furiosa-ai/k8s-device-plugin:0.10.1"

# ─────────────────────────────────────────────────────────────────────────────
# (3) pre-upgrade cleanup Job 의 kubectl 이미지: 역시 prefix 미적용 → full 경로 override.
# ─────────────────────────────────────────────────────────────────────────────
crdUpgrade:
  kubectlImage: "<your-registry>/bitnami/kubectl:1.28"
