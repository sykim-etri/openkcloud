apiVersion: v1
kind: ServiceAccount
metadata: { name: npu-detector, namespace: kube-system }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: npu-detector }
rules:
- apiGroups: ["npu.ai"]
  resources: ["nodedevicereports","nodedevicereports/status"]
  verbs: ["get","list","watch","create","update","patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: npu-detector }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: npu-detector }
subjects:
- kind: ServiceAccount
  name: npu-detector
  namespace: kube-system
