apiVersion: npu.ai/v1alpha1
kind: DriverInstallPolicy
metadata:
  name: nvidia-gpu
spec:
  vendor: nvidia
  model: generic
  rebootStrategy: IfNeeded
  kernelAllowlist: ["5.15.*","6.8.*"]
  containerdMinVersion: "1.7.0"
  driver:
    # 방법1) APT 자동(ubuntu-drivers autoinstall 또는 지정 패키지)
    installer: apt
    version: ""  # 비우면 권장 자동 선택(엔트리포인트에 구현)
    image: 129.254.202.88:5100/nvidia-driver-installer:2.1
    env:
      - name: NVIDIA_DRIVER_CHOICE
        value: "recommended"   # 또는 "nvidia-driver-575-server"
  toolkit:
    enabled: true
    method: apt
    version: ""        # 비워도 됨(엔트리포인트의 최신)
    image: 129.254.202.88:5100/nvidia-driver-installer:2.1
