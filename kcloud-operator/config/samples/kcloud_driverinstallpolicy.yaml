apiVersion: npu.ai/v1alpha1
kind: DriverInstallPolicy
metadata:
  name: nvidia-gpu
spec:
  vendor: nvidia
  model: generic
  rebootStrategy: IfNeeded
  kernelAllowlist: ["5.15.*", "6.8.*"]
  containerdMinVersion: "1.7.0"
  driver:
    installer: apt
    version: "nvidia-driver-535"
    image: 129.254.202.88:5100/nvidia-driver-installer:1.0
  toolkit:
    enabled: true
    method: apt
    version: ""
    image: 129.254.202.88:5100/nvidia-driver-installer:1.0
---
apiVersion: npu.ai/v1alpha1
kind: DriverInstallPolicy
metadata:
  name: furiosa-warboy
spec:
  vendor: furiosa
  model: warboy
  rebootStrategy: IfNeeded
  kernelAllowlist: ["5.15.*", "6.8.*"]
  containerdMinVersion: "1.7.0"
  driver:
    version: "1.0"
    image: "129.254.202.88:5100/furiosa-driver-installer:1.0"

