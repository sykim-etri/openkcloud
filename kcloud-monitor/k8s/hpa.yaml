apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kcloud-monitor
  labels:
    app: kcloud-monitor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kcloud-monitor
  # Scaling beyond 1 replica requires Redis-backed cache (per-pod in-memory otherwise).
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
