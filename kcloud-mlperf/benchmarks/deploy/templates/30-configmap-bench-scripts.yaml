# consumes: KCLOUD_NAMESPACE BENCH_SCRIPTS_CM RELEASE MANAGED_BY PART_OF
#
# NEW VAR (extended contract): BENCH_SCRIPT_CONTENT
#   Not in the frozen list — introduced here; installer worker must align.
#   The installer must export BENCH_SCRIPT_CONTENT as the contents of
#   benchmarks/mlperf_cnndm100_fp8.py with EVERY line prefixed by 4 spaces
#   (required for YAML literal-block scalar indentation under the '|').
#
#   Example (in installer render function, before envsubst):
#     export BENCH_SCRIPT_CONTENT
#     BENCH_SCRIPT_CONTENT=$(sed 's/^/    /' "${REPO_ROOT}/benchmarks/mlperf_cnndm100_fp8.py")
#
#   IMPORTANT: Call envsubst with an EXPLICIT variable list so that any
#   Python-level '$' patterns inside the script are not accidentally expanded.
#   The installer's render() must enumerate only the known template vars, e.g.:
#     envsubst '${KCLOUD_NAMESPACE} ${BENCH_SCRIPTS_CM} ${RELEASE} ${MANAGED_BY} ${PART_OF} ${BENCH_SCRIPT_CONTENT}'
#   A blank/dummy BENCH_SCRIPT_CONTENT during --dry-run is fine (empty literal block is valid YAML).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${BENCH_SCRIPTS_CM}
  namespace: ${KCLOUD_NAMESPACE}
  labels:
    app.kubernetes.io/managed-by: ${MANAGED_BY}
    app.kubernetes.io/part-of: ${PART_OF}
    app.kubernetes.io/name: ${RELEASE}
data:
  mlperf_cnndm100_fp8.py: |
${BENCH_SCRIPT_CONTENT}
