# consumes: KCLOUD_NAMESPACE HF_SECRET_NAME HF_TOKEN_B64 RELEASE MANAGED_BY PART_OF
#
# NOTE: The installer omits this file (skips apply) when reusing an existing in-cluster
# secret. HF_TOKEN_B64 is the base64-encoded token value; it must NEVER be logged.
apiVersion: v1
kind: Secret
metadata:
  name: ${HF_SECRET_NAME}
  namespace: ${KCLOUD_NAMESPACE}
  labels:
    app.kubernetes.io/managed-by: ${MANAGED_BY}
    app.kubernetes.io/part-of: ${PART_OF}
    app.kubernetes.io/name: ${RELEASE}
type: Opaque
data:
  token: ${HF_TOKEN_B64}
