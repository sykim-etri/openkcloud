# consumes: KCLOUD_NAMESPACE RELEASE SA_NAME BENCH_IMAGE DEVICE_MODE DEVICE_RESOURCE
#           DEVICE_RESOURCE_COUNT RESULTS_PVC_NAME HF_SECRET_NAME MANAGED_BY PART_OF
#
# OPTIONAL BLOCK STRATEGY (device request):
#   The installer render() strips lines between KCLOUD_BEGIN/END_DEVICE_REQUEST
#   sentinels (via sed range delete) BEFORE calling envsubst when DEVICE_RESOURCE
#   is empty. When non-empty, sentinel comment lines are valid YAML comments.
apiVersion: batch/v1
kind: Job
metadata:
  name: ${RELEASE}-smoke
  namespace: ${KCLOUD_NAMESPACE}
  labels:
    app.kubernetes.io/managed-by: ${MANAGED_BY}
    app.kubernetes.io/part-of: ${PART_OF}
    app.kubernetes.io/name: ${RELEASE}
    app.kubernetes.io/component: smoke
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: ${MANAGED_BY}
        app.kubernetes.io/part-of: ${PART_OF}
        app.kubernetes.io/name: ${RELEASE}
        app.kubernetes.io/component: smoke
    spec:
      restartPolicy: Never
      serviceAccountName: ${SA_NAME}
      containers:
        - name: smoke
          image: ${BENCH_IMAGE}
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              echo "=== kcloud-mlperf smoke [${RELEASE}] device=${DEVICE_MODE} $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
              python3 -c "
              import sys, json
              print('Python', sys.version)
              try:
                  import vllm
                  print('vllm', getattr(vllm, '__version__', 'present'), 'OK')
              except ImportError:
                  print('vllm not present (expected for non-GPU/client image)')
              import json, os
              print('stdlib OK')
              "
              mkdir -p /mnt/datasets/smoke
              printf '{"release":"${RELEASE}","device_mode":"${DEVICE_MODE}","smoke":"passed","ts":"%s"}\n' \
                "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > /mnt/datasets/smoke/marker.json
              cat /mnt/datasets/smoke/marker.json
              echo "=== smoke PASSED ==="
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ${HF_SECRET_NAME}
                  key: token
                  optional: true
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ${HF_SECRET_NAME}
                  key: token
                  optional: true
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
# KCLOUD_BEGIN_DEVICE_REQUEST
              ${DEVICE_RESOURCE}: "${DEVICE_RESOURCE_COUNT}"
# KCLOUD_END_DEVICE_REQUEST
            limits:
              cpu: "2"
              memory: "4Gi"
# KCLOUD_BEGIN_DEVICE_REQUEST
              ${DEVICE_RESOURCE}: "${DEVICE_RESOURCE_COUNT}"
# KCLOUD_END_DEVICE_REQUEST
          volumeMounts:
            - mountPath: /mnt/datasets
              name: results
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: ${RESULTS_PVC_NAME}
