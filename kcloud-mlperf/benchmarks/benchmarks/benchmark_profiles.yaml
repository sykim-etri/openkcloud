# Canonical benchmark profiles for the ETRI LLM benchmark cluster.
# Single source of truth consumed by benchmark runner Jobs and validate_legitimacy.sh.
#
# Field contract:
#   - Use null (YAML null) when a field is not applicable; never omit a field.
#   - dataset.sha256: "PLACEHOLDER" when the exact digest is not yet pinned.
#   - image.digest: "" when not yet built; filled by scripts/08_build_and_push_images.sh.
#   - comparability_class: strict_apples_to_apples | hardware_optimized | non_comparable_diagnostic
#
# RUN_ID this file was generated for: 20260428-072038-a612a54

profiles:

  # ---------------------------------------------------------------------------
  # 1. MLPerf Llama-3.1-8B FP8 on L40 — offline scenario
  # ---------------------------------------------------------------------------
  - id: mlperf-llama3.1-8b-fp8-l40-offline
    name: "MLPerf Llama-3.1-8B FP8 L40 Offline"
    category: mlperf

    model_revision: "meta-llama/Llama-3.1-8B-Instruct@f45de8b8fc4e4aee26862e5df2fa17a83dc96f2c"
    precision: fp8
    quantization: fp8-dynamic

    dataset:
      name: "open-orca"
      version: "mlperf-v5.1-openorca-gptq"
      sha256: "PLACEHOLDER"

    prompt_template: |
      <|begin_of_text|><|start_header_id|>system<|end_header_id|>
      You are a helpful assistant.<|eot_id|><|start_header_id|>user<|end_header_id|>
      {input}<|eot_id|><|start_header_id|>assistant<|end_header_id|>

    max_input_tokens: 1024
    max_output_tokens: 512
    target_output_tokens: 100

    batch_size: 8
    concurrency: 1
    warmups: 5
    measured_runs: 30
    seed: 42

    decoding_params:
      temperature: 0.0
      top_p: 1.0
      top_k: 1
      repetition_penalty: 1.0

    tokenizer: "meta-llama/Llama-3.1-8B-Instruct"

    backend: vllm
    image:
      repo: "jungwooshim/etri-llm-backend"
      tag: "v12"
      digest: ""

    node_selector:
      accelerator-type: gpu
      gpu-vendor: nvidia
      gpu-pair: l40-a40

    device_count: 1
    tensor_parallel: 1
    pipeline_parallel: 1

    scenario: offline

    metrics:
      accuracy: null
      latency: p99_ttft_ms
      throughput: tokens_per_second
      primary: throughput

    comparability_class: strict_apples_to_apples

  # ---------------------------------------------------------------------------
  # 2. MLPerf Llama-3.1-8B FP8 on A40 (Ampere) — FP8 not natively supported;
  #    runtime falls back to BF16 emulation. Flagged non_comparable_diagnostic.
  # ---------------------------------------------------------------------------
  - id: mlperf-llama3.1-8b-fp8-a40-offline
    name: "MLPerf Llama-3.1-8B FP8(→BF16 fallback) A40 Offline"
    category: mlperf

    model_revision: "meta-llama/Llama-3.1-8B-Instruct@f45de8b8fc4e4aee26862e5df2fa17a83dc96f2c"
    # Requested fp8 but A40 (Ampere sm86) lacks native FP8 hardware;
    # vLLM silently degrades to BF16. Operator MUST confirm via vllm log.
    precision: fp8
    quantization: fp8-dynamic

    dataset:
      name: "open-orca"
      version: "mlperf-v5.1-openorca-gptq"
      sha256: "PLACEHOLDER"

    prompt_template: |
      <|begin_of_text|><|start_header_id|>system<|end_header_id|>
      You are a helpful assistant.<|eot_id|><|start_header_id|>user<|end_header_id|>
      {input}<|eot_id|><|start_header_id|>assistant<|end_header_id|>

    max_input_tokens: 1024
    max_output_tokens: 512
    target_output_tokens: 100

    batch_size: 8
    concurrency: 1
    warmups: 5
    measured_runs: 30
    seed: 42

    decoding_params:
      temperature: 0.0
      top_p: 1.0
      top_k: 1
      repetition_penalty: 1.0

    tokenizer: "meta-llama/Llama-3.1-8B-Instruct"

    backend: vllm
    image:
      repo: "jungwooshim/etri-llm-backend"
      tag: "v12"
      digest: ""

    # node2 has L40+A40; target the A40 via explicit resource requests in Job spec
    node_selector:
      accelerator-type: gpu
      gpu-vendor: nvidia
      gpu-pair: l40-a40

    device_count: 1
    tensor_parallel: 1
    pipeline_parallel: 1

    scenario: offline

    metrics:
      accuracy: null
      latency: p99_ttft_ms
      throughput: tokens_per_second
      primary: throughput

    # FP8 falls back to BF16 on Ampere — results are not directly comparable to
    # Ada Lovelace (L40) FP8 or RNGD FP8 results.
    comparability_class: non_comparable_diagnostic

