---
# catalog-service가 참조하는 TimescaleDB 접속 정보
apiVersion: v1
kind: Secret
metadata:
  name: timescaledb-secret
  namespace: kcp-control-plane
type: Opaque
stringData:
  database_url: "postgresql://platform:platform1234@timescaledb.data-pipeline.svc.cluster.local:5432/workload_data"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: kcp-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      # gpu-server-01 은 control-plane 노드 → taint 허용 필요
      nodeSelector:
        kubernetes.io/hostname: gpu-server-01
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: catalog-service
        image: 10.0.4.230:5000/catalog-service:0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50051
          name: grpc
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: timescaledb-secret
              key: database_url
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: kcp-control-plane
spec:
  type: NodePort
  selector:
    app: catalog-service
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
    nodePort: 30052
