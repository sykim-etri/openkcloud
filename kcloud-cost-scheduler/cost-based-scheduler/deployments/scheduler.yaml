apiVersion: v1
kind: ServiceAccount
metadata:
  name: cost-based-scheduler
  namespace: kcloud-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cost-based-scheduler-role
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "namespaces", "configmaps", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/binding", "pods/status"]
  verbs: ["create", "patch", "update"]
- apiGroups: ["events.k8s.io", ""]
  resources: ["events"]
  verbs: ["create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cost-based-scheduler-binding
subjects:
- kind: ServiceAccount
  name: cost-based-scheduler
  namespace: kcloud-system
roleRef:
  kind: ClusterRole
  name: cost-based-scheduler-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-based-scheduler
  namespace: kcloud-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cost-based-scheduler
  template:
    metadata:
      labels:
        app: cost-based-scheduler
    spec:
      serviceAccountName: cost-based-scheduler
      containers:
      - name: scheduler
        image: kcloud-cost-scheduler:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
