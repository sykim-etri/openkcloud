# Accelerator Configuration for Cost-Based Scheduler
# This file defines GPU/NPU specifications for cost and power efficiency scoring
#
# How GPU matching works:
# 1. Node labels: accelerator.type + accelerator.model (exact match)
# 2. Resource detection: nvidia.com/gpu, nvidia.com/mig-*, furiosa.ai/warboy
# 3. GPU product label: nvidia.com/gpu.product (partial match)
# 4. Fallback: node labels for raw metrics (backward compatibility)

accelerators:
  # ── 실제 보유 하드웨어 (gpu-npu-server-02) ─────────────────────────────────
  - name: "NVIDIA RTX PRO 6000 Blackwell"
    type: "gpu"
    vendor: "nvidia"
    model: "rtx-pro-6000-blackwell"
    memory_gb: 96
    specs:
      cost_per_hour: 2.50         # data-catalog/table.txt hw_id=2 기반
      perf_score: 2519            # FP16 251.9 TFLOPS × 10
      power_watts: 300            # TDP
      perf_per_watt: 8.40         # 251.9 TFLOPS / 300W
      inference_affinity: 0.85
      training_affinity: 1.0

  # ── 실제 보유 하드웨어 (gpu-server-01 / Master 노드) ─────────────────────
  - name: "NVIDIA RTX A6000"
    type: "gpu"
    vendor: "nvidia"
    model: "rtx-a6000"
    memory_gb: 48
    specs:
      cost_per_hour: 1.20         # data-catalog/table.txt hw_id=1 기반
      perf_score: 774             # FP16 77.4 TFLOPS × 10
      power_watts: 300            # TDP
      perf_per_watt: 2.58         # 77.4 TFLOPS / 300W
      inference_affinity: 0.8
      training_affinity: 0.9

