# Pod Affinity Configuration
affinity_config:
  pod_affinity_weight: 20.0              # Max score for pod affinity
  same_job_bonus_per_pod: 2.0            # Bonus per same-job pod (preferred mode)
  same_queue_bonus_per_pod: 1.0          # Bonus per same-queue pod (preferred mode)
  anti_affinity_penalty_per_pod: 5.0     # Penalty per same-job pod (anti mode)
  default_mode: "preferred"              # Default affinity mode: none, preferred, anti

# Scoring Weight Configuration
scoring_weights:
  cost_efficiency_max: 50.0              # Max score for cost efficiency (0-50)
  power_efficiency_max: 30.0             # Max score for power efficiency (0-30)
  workload_affinity_max: 20.0            # Max score for workload type affinity
  pod_affinity_max: 20.0                 # Max score for pod affinity (0-20)
  base_score: 0.0                        # Base score added to all nodes
